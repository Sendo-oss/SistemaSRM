{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">{% if object %}Editar proveedor{% else %}Nuevo proveedor{% endif %}</h1>
    <a href="{% url 'proveedores:lista' %}">Volver</a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                {% for field in form %}
                    <div class="{% if field.name == 'direccion' or field.name == 'productos_suministrados' or field.name == 'observaciones' %}col-12{% else %}col-md-6{% endif %}">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors }}</div>{% endif %}
                    </div>
                {% endfor %}
            </div>
            <button class="btn btn-primary mt-4" type="submit">Guardar</button>
        </form>
    </div>
</div>
{% endblock %}
