{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">Pedidos</h1>
    <a class="btn btn-primary" href="{% url 'ventas:crear' %}">Nuevo pedido</a>
</div>

<form class="card card-body mb-3" method="get">
    <div class="row g-2">
        <div class="col-md-10"><input class="form-control" name="q" value="{{ request.GET.q }}" placeholder="Buscar por cliente"></div>
        <div class="col-md-2 d-grid"><button class="btn btn-outline-primary" type="submit">Buscar</button></div>
    </div>
</form>

<div class="card border-0 shadow-sm">
    <div class="table-responsive">
        <table class="table table-hover mb-0">
            <thead><tr><th>Pedido</th><th>Cliente</th><th>Estado</th><th>Total</th><th></th></tr></thead>
            <tbody>
                {% for pedido in pedidos %}
                    <tr>
                        <td>#{{ pedido.pk }}</td>
                        <td>{{ pedido.cliente }}</td>
                        <td>{{ pedido.get_estado_display }}</td>
                        <td>${{ pedido.total }}</td>
                        <td><a href="{% url 'ventas:detalle' pedido.pk %}">Ver</a></td>
                    </tr>
                {% empty %}
                    <tr><td colspan="5">No hay pedidos registrados.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
